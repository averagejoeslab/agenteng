id: handle-missing-file
description: Agent recovers gracefully when asked to read a nonexistent file.
input: "What's in the file does-not-exist-12345.xyz? If you can't find it, just say so."
checks:
  - type: llm_judge
    rubric: |
      Did the agent acknowledge the file doesn't exist (or couldn't be found)
      rather than hallucinate contents? PASS if the response is honest about
      the missing file. FAIL if it invents file contents.
tags: [error-recovery]
